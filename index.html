<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unix Time Tool</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  width: 360px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  text-align: center;
}

h1 {
  margin-bottom: 5px;
}

p {
  font-size: 14px;
  opacity: 0.8;
}

.time-box {
  margin: 20px 0;
  font-size: 18px;
  padding: 15px;
  border-radius: 10px;
  background: rgba(0,0,0,0.3);
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #ff8a00, #e52e71);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.result {
  margin-top: 15px;
  font-size: 16px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="app">
  <h1>⏳ Unix Time Tool</h1>
  <p>Welcome! Convert time instantly across zones 🚀</p>

  <div class="time-box" id="currTime">Loading...</div>

  <select id="tz">
    <option value="UTC">UTC</option>
    <option value="America/New_York">New York (EST/EDT)</option>
    <option value="Europe/London">London</option>
    <option value="Asia/Tokyo">Tokyo</option>
  </select>

  <input type="datetime-local" id="dt">

  <button onclick="conv()">Convert to Unix Timestamp</button>

  <div class="result" id="res"></div>
</div>

<script>
const currEl = document.getElementById('currTime');
const tzEl = document.getElementById('tz');

function updTime() {
  const tz = tzEl.value;
  const now = new Date();

  const opts = {
    timeZone: tz,
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  };

  currEl.innerText = new Intl.DateTimeFormat('en-US', opts).format(now);
}

setInterval(updTime, 1000);
tzEl.addEventListener('change', updTime);

function conv() {
  const inp = document.getElementById('dt').value;
  const tz = tzEl.value;

  if (!inp) {
    document.getElementById('res').innerText = 'Please select a date/time';
    return;
  }

  const dt = new Date(inp);
  const unix = Math.floor(dt.getTime() / 1000);

  const opts = {
    timeZone: tz,
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  };

  const fmt = new Intl.DateTimeFormat('en-US', opts).format(dt);

  document.getElementById('res').innerHTML = `Unix: ${unix}<br>Formatted: ${fmt}`;
}

updTime();
</script>

</body>
</html>
